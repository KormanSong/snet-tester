[project]
name = "usart-tool"
version = "0.1.0"
description = "USART I/O Mode Tool"
requires-python = ">=3.13"
dependencies = [
    "PyQt5>=5.15",
    "PyQt5-Qt5>=5.15",
    "pyqtgraph==0.14.0",
    "numpy==2.4.2",
    "pyserial==3.5",
    "pillow",
    "matplotlib",
]

[tool.setuptools]
packages = ["snet_tester", "snet_tester.comm", "snet_tester.protocol", "snet_tester.views", "snet_tester.tests"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
